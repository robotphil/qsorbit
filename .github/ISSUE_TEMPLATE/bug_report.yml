name: Bug report
description: Report something that isn't working in QSOrbit
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Not a bug?** For questions or feature ideas, please use [Discussions](https://github.com/QSOrbit/qsorbit/discussions). For security issues, see [SECURITY.md](https://github.com/QSOrbit/.github/blob/main/SECURITY.md) — please don't file them as public issues.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I've searched existing issues and didn't find a duplicate.
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I did X, Y happened instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step so we can reproduce on our end.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected QSOrbit to ...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: QSOrbit version
      description: Commit hash (run `git rev-parse --short HEAD`) or release tag if you're on one.
      placeholder: e.g., a3f7b9c or v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other (please describe in Additional context)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: e.g., Windows 11 24H2, Ubuntu 24.04, macOS 14.5
    validations:
      required: false

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `uv run python --version`.
      placeholder: e.g., Python 3.13.1
    validations:
      required: false

  - type: textarea
    id: hardware
    attributes:
      label: Hardware (if the bug touches hardware)
      description: |
        Skip this section if the bug is purely software. Otherwise, tell us what you're running:
        - Rotor model and firmware version
        - SDR model(s)
        - Antenna(s)
      placeholder: |
        Rotor: SatNOGS v3, stock firmware
        SDR: 2x RTL-SDR Blog v4
        Antenna: 2m/70cm crossed yagi
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Drag images here. Wrap log excerpts in triple-backticks so they format correctly.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help us track this down.
    validations:
      required: false
