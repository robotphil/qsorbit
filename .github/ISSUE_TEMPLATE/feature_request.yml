name: Feature request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature.

        **For substantial ideas** — new modules, architectural changes, anything that would take more than a small PR — please open a [Discussion](https://github.com/QSOrbit/qsorbit/discussions) first so we can talk through it before anyone writes code. For small, well-scoped additions, this form is the right place.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I've searched existing issues and discussions and didn't find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation. What were you doing, and what got in the way?
      placeholder: When I'm tracking a low pass, I have to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like QSOrbit to behave instead? Specifics help.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they're not as good. It's fine to write "none" here.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, references to other tools that do this, anything else that helps explain the idea.
    validations:
      required: false
